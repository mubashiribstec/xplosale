services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-xplosale}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-xplosale2024}
      POSTGRES_DB: ${POSTGRES_DB:-xplosale}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-xplosale}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Adminer (PostgreSQL web UI — like phpMyAdmin but for Postgres) ──────────
  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha
    depends_on:
      postgres:
        condition: service_healthy

  # ── DB migration (uses builder stage which has full prisma CLI) ─────────────
  migrate:
    build:
      context: .
      target: builder         # full node_modules + prisma CLI available here
    command: npx prisma db push --accept-data-loss
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── Next.js app ─────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    # No public port — nginx proxies to "app:3000" over the internal network.
    expose:
      - "3000"
    env_file: .env
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
      - exports_data:/app/exports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # ── nginx reverse proxy (SSL termination) ───────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx:/etc/nginx/conf.d:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    # reload every 6h so renewed certificates are picked up automatically
    command: >-
      /bin/sh -c "while :; do sleep 6h & wait $${!}; nginx -s reload; done &
      nginx -g 'daemon off;'"
    depends_on:
      - app

  # ── certbot (issues + auto-renews Let's Encrypt certificates) ───────────────
  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # check for renewal twice a day; renews when <30 days remain
    entrypoint: >-
      /bin/sh -c "trap exit TERM; while :; do certbot renew;
      sleep 12h & wait $${!}; done;"

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  logs_data:
  exports_data:
  certbot_conf:
  certbot_www:
