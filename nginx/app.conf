## ── Xplosale reverse proxy ────────────────────────────────────────────────────
## Terminates SSL and proxies to the Next.js "app" container over the Docker
## network. Certificates live in the certbot_conf volume (/etc/letsencrypt).

# HTTP: serve the ACME challenge, redirect everything else to HTTPS
server {
    listen 80;
    server_name app.xplosale.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS: proxy to the app container
server {
    listen 443 ssl;
    server_name app.xplosale.com;

    ssl_certificate     /etc/letsencrypt/live/app.xplosale.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.xplosale.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # allow large file uploads (product images, etc.)
    client_max_body_size 25M;

    location / {
        proxy_pass         http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
